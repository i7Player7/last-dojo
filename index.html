<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Last Dojo - V1.4</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #0a0a0a; color: #eee; font-family: 'Courier New', Courier, monospace; 
            user-select: none; -webkit-user-select: none; touch-action: none;
        }

        /* THE CSS PORTRAIT HACK */
        @media (orientation: portrait) {
            #gameContainer {
                position: absolute;
                top: 50%; left: 50%;
                width: 100vh; height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }
        @media (orientation: landscape) {
            #gameContainer {
                position: absolute;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
            }
        }
        
        #gameContainer {
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        canvas { 
            background-color: #3b4d3e; 
            width: 100%; height: 100%; 
            object-fit: contain; 
            cursor: crosshair; image-rendering: pixelated; display: block;
        }
        
        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #3a0000 0%, #0a0a0a 70%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20;
            box-sizing: border-box;
            padding: 20px;
        }
        
        .hidden { display: none !important; }
        
        .menu-title { 
            font-size: clamp(36px, 6vw, 80px); color: #d32f2f; 
            text-shadow: 4px 4px #000, 0 0 30px #d32f2f; 
            margin: 0 0 15px 0; letter-spacing: 5px; font-weight: 900; text-align: center;
        }
        
        .arcade-btn {
            background: #111; border: 2px solid #d32f2f; padding: clamp(8px, 1.5vh, 14px) 20px;
            font-family: 'Courier New', Courier, monospace; font-size: clamp(14px, 2.5vw, 24px); font-weight: bold;
            color: #eee; cursor: pointer; margin: 6px; box-shadow: 0 4px 0 #8a1f1f;
            transition: all 0.1s; text-transform: uppercase; width: 85%; max-width: 340px;
            box-sizing: border-box;
        }
        
        .arcade-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #8a1f1f; }
        .arcade-btn:hover { background: #d32f2f; color: #111; box-shadow: 0 4px 0 #000; }
        
        .pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim {
            0% { transform: scale(1); box-shadow: 0 4px 0 #8a1f1f; }
            50% { transform: scale(1.03); box-shadow: 0 4px 20px #d32f2f; border-color: #ff5555; }
            100% { transform: scale(1); box-shadow: 0 4px 0 #8a1f1f; }
        }

        #highScoreDisplay {
            color: #ffcc00; font-weight: bold; margin-top: -5px; margin-bottom: 15px; 
            letter-spacing: 2px; font-size: clamp(12px, 2.2vw, 20px); text-shadow: 2px 2px #000;
        }

        .settings-container {
            width: 95%; max-width: 480px; height: 42vh; overflow-y: auto; background: rgba(0,0,0,0.5); 
            border: 2px solid #555; padding: 12px; border-radius: 8px; margin-bottom: 10px;
        }
        .settings-container::-webkit-scrollbar { width: 8px; }
        .settings-container::-webkit-scrollbar-thumb { background: #d32f2f; border-radius: 4px; }
        
        .settings-category { color: #d32f2f; font-weight: bold; font-size: 18px; margin: 10px 0 8px 0; border-bottom: 1px solid #d32f2f; padding-bottom: 3px; text-align: left;}
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: clamp(11px, 2.2vw, 15px);}
        .settings-row label { flex: 2; text-align: left; }
        .settings-row input[type=range] { flex: 2; margin: 0 8px; cursor: pointer; accent-color: #ffcc00;}
        .settings-row input[type=checkbox] { transform: scale(1.3); margin-right: 8px; cursor: pointer; accent-color: #d32f2f;}
        
        .num-input { 
            flex: 0.7; width: 55px; background: #222; border: 1px solid #d32f2f; 
            color: #ffcc00; font-family: monospace; font-size: 14px; padding: 3px; text-align: center;
            user-select: auto; -webkit-user-select: auto; 
        }
        .num-input:focus { outline: none; border-color: #ffcc00; }
        
        .bind-btn { background: #222; border: 1px solid #d32f2f; color: #ffcc00; padding: 3px 8px; font-family: inherit; font-size: clamp(11px, 2.2vw, 15px); cursor: pointer; width: 95px; text-align: center;}
        .bind-btn.waiting { background: #d32f2f; color: #fff; animation: pulseAnim 1s infinite; }

        /* Mobile Touch Controls UI */
        #touchUI { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; overflow: hidden;}
        
        #joystickZone { position: absolute; top: 0; left: 0; width: 50%; height: 100%; pointer-events: auto; }
        #joystickBase {
            position: absolute; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; pointer-events: none; display: flex; align-items: center; justify-content: center;
            transform: translate(-50%, -50%); display: none;
        }
        #joystickStick {
            width: 50px; height: 50px; background: rgba(255, 204, 0, 0.6);
            border-radius: 50%; position: relative; pointer-events: none;
        }

        .touch-btn {
            background: rgba(211, 47, 47, 0.4); border: 2px solid rgba(211, 47, 47, 0.8);
            border-radius: 50%; color: #fff; font-weight: bold; font-family: monospace;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; text-shadow: 1px 1px 2px #000; position: absolute;
            transform: translate(-50%, -50%);
        }
        .touch-btn:active { background: rgba(211, 47, 47, 0.8); transform: translate(-50%, -50%) scale(0.9); }
        .touch-btn.editing { border: 2px dashed #ffcc00; background: rgba(211, 47, 47, 0.6); animation: pulseAnim 1s infinite; }
        
        /* Default HUD Layout percentages */
        #btnPunch { width: 90px; height: 90px; left: 88%; top: 80%; font-size: 20px;}
        #btnSpin  { width: 65px; height: 65px; left: 75%; top: 65%; font-size: 14px;}
        #btnEat   { width: 60px; height: 60px; left: 88%; top: 50%; font-size: 14px; background: rgba(255, 204, 0, 0.4); border-color: rgba(255, 204, 0, 0.8);}
        #btnSleep { width: 60px; height: 60px; left: 70%; top: 82%; font-size: 14px; background: rgba(68, 170, 68, 0.4); border-color: rgba(68, 170, 68, 0.8);}
        #btnPause { width: 45px; height: 45px; left: 5%; top: 10%; font-size: 14px; background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); border-radius: 8px;}

        #hudEditOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 14; pointer-events: auto; display: flex;
            justify-content: center; align-items: flex-start; padding-top: 15px; gap: 15px;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="1024" height="576"></canvas>

        <div id="touchUI" class="hidden">
            <div id="joystickZone"></div>
            <div id="joystickBase"><div id="joystickStick"></div></div>
            <div id="btnPunch" class="touch-zone touch-btn">PUNCH</div>
            <div id="btnSpin" class="touch-zone touch-btn">SPIN</div>
            <div id="btnEat" class="touch-zone touch-btn">EAT</div>
            <div id="btnSleep" class="touch-zone touch-btn">REST</div>
            <div id="btnPause" class="touch-zone touch-btn" onclick="if(!isEditingHUD) gameEngine.togglePause()">||</div>
        </div>

        <div id="hudEditOverlay" class="hidden">
            <button class="arcade-btn" style="width: auto; max-width: 160px; margin: 0 4px;" onclick="saveMobileHUD()">SAVE HUD</button>
            <button class="arcade-btn" style="width: auto; max-width: 160px; margin: 0 4px;" onclick="resetMobileHUD()">RESET DEFAULT</button>
        </div>

        <div id="mainMenu" class="menu-overlay">
            <h1 class="menu-title">LAST DOJO</h1>
            <p id="highScoreDisplay"></p>
            <div id="dynamicMenuButtons" style="display: flex; flex-direction: column; align-items: center; width: 100%;"></div>
        </div>

        <div id="settingsMenu" class="menu-overlay hidden">
            <h1 class="menu-title">SETTINGS</h1>
            <button class="arcade-btn" id="audioBtn" onclick="toggleAudio()">AUDIO: ON</button>
            <button class="arcade-btn" onclick="openControlsMenu()">EDIT CONTROLS</button>
            <button class="arcade-btn" onclick="closeSettings()" style="margin-top: 20px;">BACK</button>
        </div>

        <div id="controlsMenu" class="menu-overlay hidden">
            <h1 class="menu-title" style="font-size: clamp(24px, 4vw, 40px); margin-bottom: 10px;">KEYBINDS</h1>
            <div class="settings-container">
                <div class="settings-row"><label>Move Up</label><button class="bind-btn" id="bind_up" onclick="startBind('up')"></button></div>
                <div class="settings-row"><label>Move Left</label><button class="bind-btn" id="bind_left" onclick="startBind('left')"></button></div>
                <div class="settings-row"><label>Move Down</label><button class="bind-btn" id="bind_down" onclick="startBind('down')"></button></div>
                <div class="settings-row"><label>Move Right</label><button class="bind-btn" id="bind_right" onclick="startBind('right')"></button></div>
                <div class="settings-row"><label>Punch</label><button class="bind-btn" id="bind_punch" onclick="startBind('punch')"></button></div>
                <div class="settings-row"><label>Spin Kick</label><button class="bind-btn" id="bind_spin" onclick="startBind('spin')"></button></div>
                <div class="settings-row"><label>Sleep</label><button class="bind-btn" id="bind_sleep" onclick="startBind('sleep')"></button></div>
                <div class="settings-row"><label>Eat</label><button class="bind-btn" id="bind_eat" onclick="startBind('eat')"></button></div>
                <div class="settings-row"><label>Pause</label><button class="bind-btn" id="bind_pause" onclick="startBind('pause')"></button></div>
            </div>
            <button class="arcade-btn" onclick="closeControlsMenu()">DONE</button>
        </div>

        <div id="endlessSettingsMenu" class="menu-overlay hidden">
            <h1 class="menu-title" style="font-size: clamp(24px, 4vw, 40px); margin-bottom: 10px;">ENDLESS OPTIONS</h1>
            <div class="settings-container" style="color: #fff;">
                <div class="settings-category">The World</div>
                <div class="settings-row"><label>Blood Moon Freq.</label><input type="range" id="eo_bmFreq" min="1" max="14" step="1" oninput="updateEO('bmFreq', this.value)"><input type="number" id="num_bmFreq" class="num-input" min="1" max="14" step="1" oninput="updateEO('bmFreq', this.value)"></div>
                <div class="settings-row"><label>Day/Night Length</label><input type="range" id="eo_phaseLen" min="0.2" max="3" step="0.1" oninput="updateEO('phaseLen', this.value)"><input type="number" id="num_phaseLen" class="num-input" min="0.2" max="3" step="0.1" oninput="updateEO('phaseLen', this.value)"></div>
                <div class="settings-row"><label>Bandage Drop %</label><input type="range" id="eo_bandageDrop" min="0" max="1.0" step="0.05" oninput="updateEO('bandageDrop', this.value)"><input type="number" id="num_bandageDrop" class="num-input" min="0" max="1.0" step="0.05" oninput="updateEO('bandageDrop', this.value)"></div>
                <div class="settings-row"><label>Starting Crates</label><input type="range" id="eo_crates" min="0" max="10" step="1" oninput="updateEO('crates', this.value)"><input type="number" id="num_crates" class="num-input" min="0" max="10" step="1" oninput="updateEO('crates', this.value)"></div>
                <div class="settings-row"><label>Dojo Max HP</label><input type="range" id="eo_dojoHp" min="10" max="1000" step="10" oninput="updateEO('dojoHp', this.value)"><input type="number" id="num_dojoHp" class="num-input" min="10" max="1000" step="10" oninput="updateEO('dojoHp', this.value)"></div>
                
                <div class="settings-category">The Player</div>
                <div class="settings-row"><label>Player Speed</label><input type="range" id="eo_pSpeed" min="0.5" max="3" step="0.1" oninput="updateEO('pSpeed', this.value)"><input type="number" id="num_pSpeed" class="num-input" min="0.5" max="3" step="0.1" oninput="updateEO('pSpeed', this.value)"></div>
                <div class="settings-row"><label>Lifesteal / Hit</label><input type="range" id="eo_lifesteal" min="0" max="10" step="1" oninput="updateEO('lifesteal', this.value)"><input type="number" id="num_lifesteal" class="num-input" min="0" max="10" step="1" oninput="updateEO('lifesteal', this.value)"></div>
                <div class="settings-row"><label>Knockback Power</label><input type="range" id="eo_knockback" min="0" max="5" step="0.1" oninput="updateEO('knockback', this.value)"><input type="number" id="num_knockback" class="num-input" min="0" max="5" step="0.1" oninput="updateEO('knockback', this.value)"></div>
                <div class="settings-row"><label>Spin Cooldown</label><input type="range" id="eo_spinCd" min="0" max="3" step="0.1" oninput="updateEO('spinCd', this.value)"><input type="number" id="num_spinCd" class="num-input" min="0" max="3" step="0.1" oninput="updateEO('spinCd', this.value)"></div>
                <div class="settings-row"><label>Stamina Drain</label><input type="range" id="eo_stamDrain" min="0" max="3" step="0.1" oninput="updateEO('stamDrain', this.value)"><input type="number" id="num_stamDrain" class="num-input" min="0" max="3" step="0.1" oninput="updateEO('stamDrain', this.value)"></div>

                <div class="settings-category">The Horde</div>
                <div class="settings-row"><label>Max Zombies Cap</label><input type="range" id="eo_maxZ" min="5" max="150" step="5" oninput="updateEO('maxZ', this.value)"><input type="number" id="num_maxZ" class="num-input" min="5" max="150" step="5" oninput="updateEO('maxZ', this.value)"></div>
                <div class="settings-row"><label>Spawn Rate</label><input type="range" id="eo_spawnRate" min="0.1" max="5" step="0.1" oninput="updateEO('spawnRate', this.value)"><input type="number" id="num_spawnRate" class="num-input" min="0.1" max="5" step="0.1" oninput="updateEO('spawnRate', this.value)"></div>
                <div class="settings-row"><label>Zombie Health</label><input type="range" id="eo_zHealth" min="0.1" max="5" step="0.1" oninput="updateEO('zHealth', this.value)"><input type="number" id="num_zHealth" class="num-input" min="0.1" max="5" step="0.1" oninput="updateEO('zHealth', this.value)"></div>
                <div class="settings-row"><label>Zombie Damage</label><input type="range" id="eo_zDamage" min="0.1" max="5" step="0.1" oninput="updateEO('zDamage', this.value)"><input type="number" id="num_zDamage" class="num-input" min="0.1" max="5" step="0.1" oninput="updateEO('zDamage', this.value)"></div>
                <div class="settings-row"><label>Zombie Speed</label><input type="range" id="eo_zSpeed" min="0.5" max="3" step="0.1" oninput="updateEO('zSpeed', this.value)"><input type="number" id="num_zSpeed" class="num-input" min="0.5" max="3" step="0.1" oninput="updateEO('zSpeed', this.value)"></div>
                
                <div class="settings-category">The Warlord</div>
                <div class="settings-row"><label>Boss Spawn Freq.</label><input type="range" id="eo_bossFreq" min="1" max="50" step="1" oninput="updateEO('bossFreq', this.value)"><input type="number" id="num_bossFreq" class="num-input" min="1" max="50" step="1" oninput="updateEO('bossFreq', this.value)"></div>
                <div class="settings-row"><label>Boss Max Cap</label><input type="range" id="eo_bossCap" min="1" max="10" step="1" oninput="updateEO('bossCap', this.value)"><input type="number" id="num_bossCap" class="num-input" min="1" max="10" step="1" oninput="updateEO('bossCap', this.value)"></div>
                <div class="settings-row"><label>Boss Health</label><input type="range" id="eo_bHealth" min="0.1" max="10" step="0.5" oninput="updateEO('bHealth', this.value)"><input type="number" id="num_bHealth" class="num-input" min="0.1" max="10" step="0.5" oninput="updateEO('bHealth', this.value)"></div>
                <div class="settings-row"><label>Boss Speed</label><input type="range" id="eo_bSpeed" min="0.1" max="3" step="0.1" oninput="updateEO('bSpeed', this.value)"><input type="number" id="num_bSpeed" class="num-input" min="0.1" max="3" step="0.1" oninput="updateEO('bSpeed', this.value)"></div>
                <div class="settings-row"><label>Boss Scale (Size)</label><input type="range" id="eo_bossSize" min="0.5" max="3" step="0.1" oninput="updateEO('bossSize', this.value)"><input type="number" id="num_bossSize" class="num-input" min="0.5" max="3" step="0.1" oninput="updateEO('bossSize', this.value)"></div>

                <div class="settings-category">Mutators</div>
                <div class="settings-row" style="justify-content: flex-start;"><input type="checkbox" id="eo_infStamReg"><label>Infinite Stamina (Normal Nights)</label></div>
                <div class="settings-row" style="justify-content: flex-start;"><input type="checkbox" id="eo_infStamBM"><label>Infinite Stamina (Blood Moons)</label></div>
                <div class="settings-row" style="justify-content: flex-start;"><input type="checkbox" id="eo_dojoRegen"><label>Dojo Auto-Regen (Daytime)</label></div>
                <div class="settings-row" style="justify-content: flex-start;"><input type="checkbox" id="eo_explodeZ"><label>Exploding Zombies</label></div>
                <div class="settings-row" style="justify-content: flex-start;"><input type="checkbox" id="eo_pitchBlack"><label>Pitch Black Mode</label></div>
                <div class="settings-row" style="justify-content: flex-start;"><input type="checkbox" id="eo_lavaMode"><label>The Floor is Lava</label></div>
                <div class="settings-row" style="justify-content: flex-start;"><input type="checkbox" id="eo_ohk"><label style="color:#F00">ONE HIT KILL MODE</label></div>
            </div>
            <button class="arcade-btn" onclick="saveEndlessSettings()">SAVE & BACK</button>
        </div>

        <div id="pauseMenu" class="menu-overlay hidden">
            <h1 class="menu-title">PAUSED</h1>
            <button class="arcade-btn" onclick="gameEngine.togglePause()">RESUME (P)</button>
            <button class="arcade-btn" onclick="openSettings()">SETTINGS</button>
            <button class="arcade-btn" onclick="quitToMenu()">MAIN MENU (Q)</button>
        </div>

        <div id="gameOverMenu" class="menu-overlay hidden">
            <h1 class="menu-title" id="goTitle">YOU DIED</h1>
            <p id="goDesc" style="font-size: 24px; margin-bottom: 30px;">Survived to Day X</p>
            <button class="arcade-btn" onclick="restartGame()">RESTART (SPACE)</button>
            <button class="arcade-btn" onclick="quitToMenu()">MAIN MENU (Q)</button>
        </div>

        <div id="victoryMenu" class="menu-overlay hidden">
            <h1 class="menu-title">VICTORY</h1>
            <p style="font-size: 24px; margin-bottom: 10px; text-align:center; padding: 0 20px;">The Dojo stands. The Warlord's vessel is shattered.</p>
            <p style="font-size: 24px; color: #d32f2f; margin-bottom: 30px; font-weight: bold; text-align:center;">ENDLESS MODE UNLOCKED</p>
            <button class="arcade-btn" onclick="restartGame()">CONTINUE (SPACE)</button>
            <button class="arcade-btn" onclick="quitToMenu()">MAIN MENU (Q)</button>
        </div>
        
        <div class="controls" id="footerControls" style="bottom: 10px; pointer-events: none; z-index: 15; position: absolute;"></div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    let isEditingHUD = false;
    
    function requestMobileOptimization() {
        if (isTouchDevice) {
            if(document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch((e)=>{}); }
            if(screen.orientation && screen.orientation.lock) { screen.orientation.lock('landscape').catch((e)=>{}); }
        }
    }

    const defaultKeys = { up: 'w', left: 'a', down: 's', right: 'd', punch: ' ', spin: 'shift', sleep: 'e', eat: 'r', pause: 'p' };
    let userKeys = JSON.parse(localStorage.getItem('lastDojoKeys')) || { ...defaultKeys };
    let bindingAction = null;

    function getDisplayKey(k) { 
        if (k === ' ') return 'SPACE';
        if (k === 'escape') return 'ESC';
        return k.toUpperCase(); 
    }
    
    function updateControlsUI() {
        let footer = document.getElementById('footerControls');
        if (isTouchDevice) {
            footer.classList.add('hidden'); 
        } else {
            footer.innerHTML = `
                <p>Move: <kbd>${getDisplayKey(userKeys.up)}</kbd><kbd>${getDisplayKey(userKeys.left)}</kbd><kbd>${getDisplayKey(userKeys.down)}</kbd><kbd>${getDisplayKey(userKeys.right)}</kbd> | Sleep: <kbd>${getDisplayKey(userKeys.sleep)}</kbd> | Pause: <kbd>${getDisplayKey(userKeys.pause)}</kbd> or <kbd>ESC</kbd></p>
                <p>Punch: <kbd>Left Click</kbd> or <kbd>${getDisplayKey(userKeys.punch)}</kbd> | Spin: <kbd>Right Click</kbd> or <kbd>${getDisplayKey(userKeys.spin)}</kbd> | Eat: <kbd>${getDisplayKey(userKeys.eat)}</kbd></p>`;
            
            ['up','left','down','right','punch','spin','sleep','eat','pause'].forEach(act => {
                let btn = document.getElementById('bind_' + act);
                if(btn) { btn.innerText = getDisplayKey(userKeys[act]); btn.classList.remove('waiting'); }
            });
        }
    }

    function startBind(action) {
        if(bindingAction) document.getElementById('bind_' + bindingAction).classList.remove('waiting');
        bindingAction = action;
        let btn = document.getElementById('bind_' + action);
        btn.innerText = 'PRESS KEY...';
        btn.classList.add('waiting');
    }

    window.addEventListener('keydown', (e) => {
        if (bindingAction) {
            e.preventDefault();
            let k = e.key.toLowerCase(); if (k === 'escape') return; 
            userKeys[bindingAction] = k;
            localStorage.setItem('lastDojoKeys', JSON.stringify(userKeys));
            bindingAction = null;
            updateControlsUI();
        }
    });

    const defaultEndless = { 
        maxZ: 25, zSpeed: 1.0, zHealth: 1.0, zDamage: 1.0, bHealth: 1.0, bSpeed: 1.0, pSpeed: 1.0, 
        infStamReg: false, infStamBM: true, knockback: 1.0, spinCd: 1.0, lifesteal: 0, stamDrain: 1.0, 
        spawnRate: 1.0, explodeZ: false, bossFreq: 21, bossSize: 1.0, bossCap: 3, bmFreq: 7, 
        phaseLen: 1.0, dojoRegen: false, dojoHp: 300, crates: 3, bandageDrop: 0.1, 
        ohk: false, pitchBlack: false, lavaMode: false 
    };
    
    let endlessConfig = JSON.parse(localStorage.getItem('lastDojoEndlessConfig'));
    if (!endlessConfig) { endlessConfig = { ...defaultEndless }; } 
    else { endlessConfig = { ...defaultEndless, ...endlessConfig }; }

    function loadEndlessUI() {
        for (let k in endlessConfig) {
            let el = document.getElementById('eo_' + k);
            if (el) {

    class AudioEngine {
        constructor() { this.ctx = null; this.muted = false; }
        init() { try { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        playTone(freq, type, duration, vol=0.1, slideFreq=null) {
            if (!this.ctx || this.muted) return;
            try {
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
            } catch(e) {}
        }
        playNoise(duration, vol=0.1) {
            if (!this.ctx || this.muted) return;
            try {
                let bufferSize = this.ctx.sampleRate * duration; let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                let noise = this.ctx.createBufferSource(); noise.buffer = buffer; let gain = this.ctx.createGain();
                gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                noise.connect(gain); gain.connect(this.ctx.destination); noise.start();
            } catch(e) {}
        }
        sfxSwing() { this.playTone(150, 'sine', 0.2, 0.05, 50); }
        sfxHit() { this.playTone(100, 'square', 0.1, 0.1, 40); }
        sfxParry() { this.playTone(800, 'triangle', 0.3, 0.1); }
        sfxSpit() { this.playTone(400, 'sawtooth', 0.3, 0.05, 100); }
        sfxYeet() { this.playNoise(0.5, 0.3); this.playTone(50, 'square', 0.5, 0.2, 20); }
        sfxExplode() { this.playNoise(0.3, 0.2); }
        sfxLevelUp() { this.playTone(400, 'sine', 0.1, 0.1, 600); setTimeout(() => this.playTone(600, 'sine', 0.3, 0.1, 800), 100); }
        sfxLore() { this.playTone(200, 'sine', 0.5, 0.05); }
        sfxWarlordRoar() { this.playNoise(1.5, 0.5); this.playTone(40, 'sawtooth', 1.5, 0.3, 10); } 
        sfxFrustratedGroan() { this.playNoise(1.0, 0.2); this.playTone(30, 'sawtooth', 1.0, 0.2, 5); }
        sfxVictory() { this.playTone(400, 'sine', 0.2, 0.1, 600); setTimeout(() => this.playTone(600, 'sine', 0.2, 0.1, 800), 200); setTimeout(() => this.playTone(800, 'sine', 0.6, 0.1, 1200), 400); }
    }

    function drawCharacter(c, ent, frames, gameMode) {
        let isP = ent.type === 'player'; let t = ent.type; let s = (t === 'brute') ? 1.4 : (t === 'warlord' ? 2.2 : 1.0); 
        
        if (gameMode === 'ENDLESS' && t === 'warlord') s *= endlessConfig.bossSize;

        let walk = ent.dead || ent.spawnTimer > 0 || ent.isCasting > 0 ? 0 : (ent.isMoving ? Math.sin(frames * 0.3) : 0);
        let punchProgress = ent.dead || ent.spawnTimer > 0 ? 0 : (ent.isAttacking && !ent.isSpinning ? (15 - ent.attackTimer)/15 : 0); 
        
        let ext = 0; 
        if (punchProgress > 0) ext = punchProgress < 0.2 ? (punchProgress / 0.2) * 16*s : (1 - (punchProgress - 0.2)/0.8) * 16*s;
        let isBiting = (!isP && ent.biteTimer > 45 && !ent.dead && !ent.spawnTimer); let biteLunge = isBiting ? 6*s : 0;

        c.save(); 
        let yOffset = 0;
        if (ent.spawnTimer > 0) {
            let progress = 1 - (ent.spawnTimer / 120);
            yOffset = (1 - progress) * (30 * s); 
            c.beginPath(); c.rect(-100, -200, 200, 200 + ent.h/2); c.clip(); 
        }
        
        c.translate(ent.x + ent.w/2, ent.y + ent.h/2 + yOffset); 
        
        if (ent.spawnTimer > 0 || ent.isCasting > 0) c.translate((Math.random()-0.5) * 8 * s, (Math.random()-0.5) * 8 * s);
        
        if (ent.isCasting > 0 && t === 'warlord') {
            c.fillStyle = 'rgba(211, 47, 47, 0.4)';
            c.beginPath(); c.arc(0, 0, 30*s + Math.sin(frames)*5, 0, Math.PI*2); c.fill();
        }

        if (ent.dead) c.rotate(ent.rot); else if (ent.isSpinning) c.rotate(frames * 0.5); else if (!ent.facingRight) c.scale(-1, 1);
        
        let hc, bc, lc, lg;
        if (isP) { hc = '#ffcc99'; bc = '#fff'; lc = '#ffcc99'; lg = '#eeeeee'; } 
        else if (t === 'brute') { hc = '#6a1b9a'; bc = '#444'; lc = '#6a1b9a'; lg = '#212f3d'; } 
        else if (t === 'warlord') { hc = '#111'; bc = '#d32f2f'; lc = '#111'; lg = '#111'; } 
        else if (t === 'spitter') { hc = '#cddc39'; bc = '#555'; lc = '#4caf50'; lg = '#4a2311'; } 
        else { hc = '#4caf50'; bc = '#666'; lc = '#4caf50'; lg = '#2c3e50'; } 
        
        c.lineWidth = 6 * s; c.lineCap = "round";
        c.strokeStyle = lg; c.beginPath(); c.moveTo(0, 5*s); c.lineTo(walk * 10*s, 18*s); c.stroke(); c.beginPath(); c.moveTo(0, 5*s); c.lineTo(-walk * 10*s, 18*s); c.stroke(); 
        c.strokeStyle = lc; c.beginPath(); c.moveTo(0, -6*s); 
        if (ent.isSpinning || ent.dead) c.lineTo(20*s, -6*s); else c.lineTo(-walk * 8*s, 4*s); c.stroke();
        
        c.fillStyle = bc; c.fillRect(-7*s, -10*s, 14*s, 16*s);
        if (isP) { c.fillStyle = '#000'; c.fillRect(-7*s, 2*s, 14*s, 4*s); } 
        if (t === 'brute' || t === 'warlord') { c.fillStyle = '#666'; c.fillRect(-5*s, -8*s, 10*s, 10*s); } 
        
        c.fillStyle = hc; c.fillRect(-6*s + biteLunge, -22*s, 12*s, 12*s);
        c.fillStyle = (t === 'spitter') ? '#fff' : (t === 'warlord' ? '#ff0000' : '#000'); c.fillRect(2*s + biteLunge, -20*s, 3*s, 3*s); 
        
        c.strokeStyle = lc; c.beginPath(); c.moveTo(0, -6*s);
        if (ent.isSpinning || ent.dead) { c.lineTo(-20*s, -6*s); } else if (ent.isAttacking) { c.lineTo(10*s + ext, -6*s); } else if (isBiting) { c.lineTo(12*s, -15*s); } else { c.lineTo(walk * 8*s, 4*s); }
        c.stroke(); 

        if (ent.isAttacking && !ent.isSpinning && !ent.dead) { c.fillStyle = lc; c.fillRect(10*s + ext - 3*s, -9*s, 6*s, 6*s); }
        c.restore();
    }

        bindInput() {
            if (isTouchDevice) {
                let joyZone = document.getElementById('joystickZone');
                let joyBase = document.getElementById('joystickBase');
                let joyStick = document.getElementById('joystickStick');
                let joyActive = false; let joyOrigin = {x:0, y:0}; let joyMax = 40;
                let joyTouchId = null;

                joyZone.addEventListener('touchstart', (e) => {
                    e.preventDefault(); 
                    if (joyActive || isEditingHUD) return; 
                    let touch = e.changedTouches[0];
                    joyTouchId = touch.identifier;
                    joyActive = true;
                    
                    joyOrigin = { x: touch.clientX, y: touch.clientY };
                    joyBase.style.left = (joyOrigin.x) + 'px';
                    joyBase.style.top = (joyOrigin.y) + 'px';
                    joyBase.style.bottom = 'auto'; 
                    joyBase.style.display = 'flex';
                    
                    updateJoy(touch);
                }, {passive: false});

                document.addEventListener('touchmove', (e) => {
                    if (!joyActive || isEditingHUD) return;
                    for(let i=0; i<e.changedTouches.length; i++) {
                        if(e.changedTouches[i].identifier === joyTouchId) {
                            e.preventDefault(); 
                            updateJoy(e.changedTouches[i]);
                            break;
                        }
                    }
                }, {passive: false});

                const stopJoy = (e) => {
                    if (!joyActive || isEditingHUD) return;
                    for(let i=0; i<e.changedTouches.length; i++) {
                        if(e.changedTouches[i].identifier === joyTouchId) {
                            joyActive = false;
                            joyTouchId = null;
                            joyStick.style.transform = `translate(0px, 0px)`;
                            joyBase.style.display = 'none';
                            this.keys.up = false; this.keys.down = false; 
                            this.keys.left = false; this.keys.right = false;
                            break;
                        }
                    }
                };
                document.addEventListener('touchend', stopJoy); 
                document.addEventListener('touchcancel', stopJoy);

                const updateJoy = (touch) => {
                    let dx = touch.clientX - joyOrigin.x; let dy = touch.clientY - joyOrigin.y;
                    
                    if (window.innerHeight > window.innerWidth) {
                        let tmp = dx; dx = dy; dy = -tmp;
                    }

                    let dist = Math.hypot(dx, dy);
                    if (dist > joyMax) { dx = (dx/dist)*joyMax; dy = (dy/dist)*joyMax; }
                    joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
                    
                    let deadzone = 10;
                    this.keys.up = dy < -deadzone;
                    this.keys.down = dy > deadzone;
                    this.keys.left = dx < -deadzone;
                    this.keys.right = dx > deadzone;
                };

                const bindTouchBtn = (id, keyName) => {
                    let btn = document.getElementById(id);
                    if(!btn) return;
                    
                    let isDragging = false;
                    
                    btn.addEventListener('touchstart', (e) => { 
                        if(isEditingHUD) {
                            isDragging = true;
                        } else {
                            e.preventDefault(); this.keys[keyName] = true; 
                        }
                    }, {passive:false});
                    
                    btn.addEventListener('touchmove', (e) => {
                        if (isEditingHUD && isDragging) {
                            e.preventDefault();
                            let touch = e.touches[0];
                            
                            let percentX, percentY;
                            if (window.innerHeight > window.innerWidth) {
                                percentX = (touch.clientY / window.innerHeight) * 100;
                                percentY = ((window.innerWidth - touch.clientX) / window.innerWidth) * 100;
                            } else {
                                percentX = (touch.clientX / window.innerWidth) * 100;
                                percentY = (touch.clientY / window.innerHeight) * 100;
                            }

                            percentX = Math.max(5, Math.min(95, percentX));
                            percentY = Math.max(5, Math.min(95, percentY));

                            btn.style.left = percentX + '%';
                            btn.style.top = percentY + '%';
                            btn.style.right = 'auto';
                            btn.style.bottom = 'auto';
                        }
                    }, {passive:false});

                    btn.addEventListener('touchend', (e) => { 
                        if (isEditingHUD) {
                            isDragging = false;
                        } else {
                            e.preventDefault(); this.keys[keyName] = false; 
                            if(keyName === 'sleep') this.eReady = true; 
                            if(keyName === 'eat') this.rReady = true; 
                            if(keyName === 'spin') this.shiftReady = true; 
                        }
                    });
                };
                bindTouchBtn('btnPunch', 'punch'); bindTouchBtn('btnSpin', 'spin');
                bindTouchBtn('btnEat', 'eat'); bindTouchBtn('btnSleep', 'sleep');
            }

            document.addEventListener('mousedown', (e) => {
                if (e.target !== canvas && ['PLAYING', 'TUTORIAL', 'SUNRISE'].includes(this.state)) {
                    for (let k in this.keys) this.keys[k] = false; this.mouse.left = false; this.mouse.right = false;
                    this.player.isMoving = false; this.player.isAttacking = false; this.player.isSpinning = false;
                    if (!this.paused && !isTouchDevice) this.togglePause();
                }
            });
            window.addEventListener('blur', () => {
                for (let k in this.keys) this.keys[k] = false; this.mouse.left = false; this.mouse.right = false;
                this.player.isAttacking = false; this.player.isSpinning = false;
                if(['PLAYING', 'TUTORIAL', 'SUNRISE'].includes(this.state) && !this.paused) this.togglePause();
            });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
            
            window.addEventListener('keydown', (e) => { 
                if(bindingAction) return;
                let key = e.key.toLowerCase(); 
                if ([' ', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) e.preventDefault(); 
                
                if (key === userKeys.up) this.keys.up = true;
                if (key === userKeys.down) this.keys.down = true;
                if (key === userKeys.left) this.keys.left = true;
                if (key === userKeys.right) this.keys.right = true;
                if (key === userKeys.sleep) this.keys.sleep = true;
                if (key === userKeys.eat) this.keys.eat = true;
                if (key === userKeys.punch) this.keys.punch = true;
                if (key === userKeys.spin) this.keys.spin = true;
                if (key === userKeys.pause || key === 'escape') {
                    this.keys.pause = true;
                    if (['PLAYING', 'TUTORIAL', 'SUNRISE'].includes(this.state)) this.togglePause();
                }

                if (key === ' ' || key === 'enter') {
                    if (this.state === 'GAMEOVER' || this.state === 'VICTORY') { restartGame(); }
                }
                if (key === 'q' && (this.paused || this.state === 'GAMEOVER' || this.state === 'VICTORY')) { this.paused = false; quitToMenu(); }
                if (key === 'o' && this.paused) openSettings();
            });
            
            window.addEventListener('keyup', (e) => { 
                if(bindingAction) return;
                let key = e.key.toLowerCase(); 
                if (key === userKeys.up) this.keys.up = false;
                if (key === userKeys.down) this.keys.down = false;
                if (key === userKeys.left) this.keys.left = false;
                if (key === userKeys.right) this.keys.right = false;
                if (key === userKeys.punch) this.keys.punch = false;
                if (key === userKeys.pause || key === 'escape') this.keys.pause = false;
                if (key === userKeys.sleep) { this.keys.sleep = false; this.eReady = true; }
                if (key === userKeys.eat) { this.keys.eat = false; this.rReady = true; }
                if (key === userKeys.spin) { this.keys.spin = false; this.shiftReady = true; }
            });
            
            canvas.addEventListener('mousedown', (e) => {
                if (this.state === 'GAMEOVER' || this.state === 'VICTORY') { restartGame(); return; }
                if (this.state === 'START' || this.paused || this.player.hp <= 0 || this.dojo.hp <= 0 || this.sleepFade > 0) return; 
                if (e.button === 0) this.mouse.left = true; if (e.button === 2) this.mouse.right = true;
            });
            window.addEventListener('mouseup', (e) => { if (e.button === 0) this.mouse.left = false; if (e.button === 2) this.mouse.right = false; });
        }

        rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) { return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2; }

        hasInfiniteStamina() {
            if (this.gameMode === 'ENDLESS') {
                if (this.isSiege) return endlessConfig.infStamBM;
                return endlessConfig.infStamReg;
            }
            return false; 
        }

        spawnBox() {
            let bx = (canvas.width / 2) + Math.random() * (canvas.width / 2 - 100); let by = Math.random() * (canvas.height - 200) + 100;
            this.boxes.push({ x: bx, y: by, hp: 10 }); 
            if (this.state === 'PLAYING') this.spawnZombie(bx, by + 40, 'straggler', bx, by); 
            this.spawnParticles(bx + 20, by + 20, '#ffffff', 15);
        }

        spawnZombie(x = null, y = null, type = 'night', anchorX = 0, anchorY = 0) {
            let actualType = type;
            if (type === 'night' && this.state === 'PLAYING') {
                let activeBrutes = this.enemies.filter(z => z.type === 'brute' && z.hp > 0).length;
                let maxBrutesAllowed = this.dayCount >= 3 ? 1 + Math.floor((this.dayCount - 3) / 3) : 0; 
                if (this.dayCount >= 3 && Math.random() < 0.12 && activeBrutes < maxBrutesAllowed) actualType = 'brute';
                else if (this.dayCount >= 4 && Math.random() < 0.15) actualType = 'spitter';
            }
            if (type === 'warlord') actualType = 'warlord';
            
            let size = (actualType === 'brute') ? 50 : (actualType === 'warlord' ? 80 : 40); 
            let baseSpeed = (actualType === 'brute') ? 0.5 : (actualType === 'warlord' ? 0.85 : 1.0 + (Math.random() * 0.5));
            let moveSpeed = Math.min(baseSpeed + Math.min(this.dayCount * 0.05, 1.5), 3.5); 
            if (this.isSiege && actualType !== 'brute' && actualType !== 'spitter' && actualType !== 'warlord') moveSpeed = Math.min(moveSpeed + 0.2, 3.5); 
            
            let hpPool = (actualType === 'brute') ? 120 : (actualType === 'spitter' ? 30 : 40);
            
            // FIXED: Added daily health scaling to Survival Mode to combat late-game power creep
            if (this.gameMode === 'SURVIVAL' && actualType !== 'warlord') {
                hpPool += Math.floor(this.dayCount * (actualType === 'brute' ? 4 : 1.5));
            }
            
            if (actualType === 'warlord') hpPool = (this.dayCount >= 21 && this.gameMode === 'SURVIVAL') ? 4000 : 2000;

            if (this.gameMode === 'ENDLESS') {
                if (actualType === 'warlord') { hpPool = Math.floor(hpPool * endlessConfig.bHealth); moveSpeed *= endlessConfig.bSpeed; size *= endlessConfig.bossSize;}
                else { hpPool = Math.floor(hpPool * endlessConfig.zHealth); moveSpeed *= endlessConfig.zSpeed; }
            }

            let spawnX = x !== null ? x : (Math.random() > 0.5 ? -50 : canvas.width + 50);
            let spawnY = y !== null ? y : (Math.random() * (canvas.height - 150) + 80);

            if (actualType === 'warlord' && x === null) {
                spawnX = canvas.width - 150;
                spawnY = Math.max(100, Math.min(canvas.height - 120, this.player.y - 40));
                this.addDecal(spawnX + size/2, spawnY + size, '#111', 2.0); 
            }

            let initialFacingRight = spawnX < this.player.x;

            this.enemies.push({ 
                x: spawnX, y: spawnY, 
                hp: hpPool, maxHp: hpPool, speed: moveSpeed, hitTimer: 0, biteTimer: 0, shootTimer: 60, type: actualType, burning: false, isMoving: true, facingRight: initialFacingRight, 
                anchorX: anchorX, anchorY: anchorY, patrolDir: 1, w: size, h: size, aggroTarget: null, aggroTimer: 0, isChasing: false,
                dojoOffsetX: (Math.random() - 0.5) * 60, dojoOffsetY: (Math.random() - 0.5) * 30,
                spawnTimer: (actualType === 'warlord' ? 120 : 0), specialTimer: (actualType === 'warlord' ? 180 : 0), isCasting: 0
            });
        }

        spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) this.particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 1) * 10, life: 15 + Math.random() * 15, color: color }); }
        spawnText(x, y, text, color) { this.floatTexts.push({ x: x, y: y, text: text, color: color, life: 60 }); }
        addDecal(x, y, color, scaleRange = 1) { this.decals.push({ x: x + (Math.random() * 20 - 10), y: y + (Math.random() * 10 - 5), s: (Math.random() * 15 + 10) * scaleRange, col: color, life: 300 }); }

        launchCorpse(z, impactDirX, extremeYeet = false) {
            let vxBase = Math.random() * 10 + (extremeYeet ? 15 : 5); let vyBase = Math.random() * 8 + (extremeYeet ? 25 : 5);
            this.corpses.push({ x: z.x, y: z.y, w: z.w, h: z.h, type: z.type, facingRight: z.facingRight, vx: impactDirX * vxBase, vy: -vyBase, rot: 0, spin: (Math.random() - 0.5) * (extremeYeet ? 1.5 : 0.5), life: 150, dead: true });
        }

        doAttack(isSpin) {
            let stamCost = isSpin ? this.player.specialCost : this.player.attackCost;
            if (this.gameMode === 'ENDLESS') stamCost *= endlessConfig.stamDrain;
            
            if (this.player.stamina < stamCost && !this.hasInfiniteStamina()) return;
            
            if (isSpin) {
                this.spinCooldown = this.gameMode === 'ENDLESS' ? Math.floor(60 * endlessConfig.spinCd) : 60; 
            }

            this.player.isAttacking = true; this.player.isSpinning = isSpin; this.player.attackTimer = isSpin ? 20 : 15; sfx.sfxSwing();
            if (!this.hasInfiniteStamina()) this.player.stamina -= stamCost;
            if (this.state === 'TUTORIAL') { if (this.tutPhase === 9 && isSpin) { this.tutPhase = 10; this.tutTimer = 60; sfx.sfxLore(); } }

            let bmMult = this.isSiege ? 2 : 1; 

            let hitbox = isSpin ? { x: this.player.x - (40*bmMult), y: this.player.y - (20*bmMult), w: 120*bmMult, h: 80*bmMult } 
                                : { x: this.player.facingRight ? this.player.x + 30 : this.player.x - (30*bmMult), y: this.player.y - 10, w: 40*bmMult, h: 60*bmMult };
            
            if (isSpin) { this.spawnParticles(this.player.x+20, this.player.y+20, '#fff', 20); this.shake = 8; }
            
            let pDmg = (isSpin ? 30 : this.player.dmg) * (this.isSiege ? 3 : 1);
            let pKb = (isSpin ? 60 : 20) * (this.isSiege ? 3 : 1);
            
            this.processHits(hitbox, pDmg, pKb); 
        }

        processHits(hitbox, damage, knockbackDist, originX = this.player.x) {
            if (['PLAYING', 'TUTORIAL', 'SUNRISE'].includes(this.state) || (this.state === 'TUTORIAL' && this.tutPhase >= 7)) {
                if (this.rectIntersect(hitbox.x, hitbox.y, hitbox.w, hitbox.h, this.dummy.x, this.dummy.y, 40, 40)) {
                    this.dummy.hits++; this.spawnParticles(this.dummy.x+20, this.dummy.y+20, '#d2b48c', 5); this.shake = Math.max(this.shake, 2); sfx.sfxHit();
                    if (this.dummy.hits >= this.dummy.hitsNeeded) {
                        this.dummy.hits = 0; this.dummy.level++; this.dummy.hitsNeeded = Math.floor(this.dummy.hitsNeeded * 1.5); 
                        this.player.maxStamina += 15; this.player.stamina = this.player.maxStamina;
                        
                        // FIXED: Re-balanced Training (Diminishing returns, +2 damage)
                        this.player.dmg += 2;
                        
                        this.spawnParticles(originX+20, this.player.y+20, '#ffcc00', 30); this.spawnText(originX+20, this.player.y-20, "STAMINA & DMG UP!", "#ffcc00"); this.shake = 10; sfx.sfxLevelUp();
                        if (this.state === 'TUTORIAL' && this.tutPhase === 8) { this.tutPhase = 9; this.tutTimer = 60; sfx.sfxLore(); }
                    }
                }
            }

            this.boxes.forEach(box => {
                if (this.rectIntersect(hitbox.x, hitbox.y, hitbox.w, hitbox.h, box.x, box.y, 40, 40)) {
                    box.hp -= damage; this.spawnParticles(box.x+20, box.y+20, '#fff', 5); sfx.sfxHit();
                    if (box.hp <= 0) { 
                        this.loot.push({ x: box.x, y: box.y, type: 'food' }); 
                        if(this.state === 'TUTORIAL') this.spawnText(box.x+20, box.y-15, "MEAT DROPPED!", "#ffcc00");
                        this.shake = Math.max(this.shake, 4); 
                        
                        this.enemies.forEach(ez => {
                            if (ez.type === 'straggler' && Math.hypot(ez.x - box.x, ez.y - box.y) < 200) {
                                ez.type = 'night';
                                ez.speed += 1.0;
                                ez.isChasing = true;
                                this.spawnParticles(ez.x+20, ez.y+20, '#ff0000', 10);
                                
                                // FIXED: Immersive Aggro Text
                                this.spawnText(ez.x+20, ez.y-10, "!", "#ff0000");
                                sfx.sfxWarlordRoar();
                            }
                        });
                    }
                }
            });

            this.enemies.forEach(z => {
                if (z.spawnTimer > 0 || z.isCasting > 0) return; 
                
                if (this.rectIntersect(hitbox.x, hitbox.y, hitbox.w, hitbox.h, z.x, z.y, z.w, z.h)) {
                    z.hp -= damage; z.hitTimer = 10; sfx.sfxHit();
                    
                    if (this.isSiege && z.type !== 'spitter' && z.type !== 'warlord') {
                        z.aggroTimer = 480; 
                    }

                    if (this.gameMode === 'ENDLESS' && endlessConfig.lifesteal > 0 && z.hp > 0) {
                        this.player.hp = Math.min(this.player.maxHp, this.player.hp + endlessConfig.lifesteal);
                    }

                    let direction = (z.x + (z.w/2)) > (originX + 20) ? 1 : -1;
                    let actualKnockback = z.type === 'brute' ? knockbackDist / 4 : (this.isSiege ? knockbackDist * 2 : knockbackDist);
                    if (z.type === 'warlord') actualKnockback = knockbackDist / 6; 
                    if (this.gameMode === 'ENDLESS') actualKnockback *= endlessConfig.knockback;

                    z.x += direction * actualKnockback; z.x = Math.max(0, Math.min(canvas.width - z.w, z.x));
                    z.y = Math.max(110, Math.min(canvas.height - z.h, z.y));

                    this.spawnParticles(z.x+20, z.y+20, (z.type === 'spitter' ? '#cddc39' : '#d32f2f'), 8); this.spawnText(z.x+20, z.y, `-${damage}`, "#fff"); 
                    this.shake = Math.max(this.shake, z.type === 'brute' ? 8 : (z.type === 'warlord' ? 12 : 4)); 
                    
                    if (z.hp <= 0 && !z.handledDeath) {
                        z.handledDeath = true; 
                        
                        if (z.type === 'warlord') { 
                            this.shake = 30; sfx.sfxExplode(); this.spawnParticles(z.x+40, z.y+40, '#d32f2f', 100); 
                            if (this.gameMode === 'SURVIVAL' && this.dayCount === 21 && this.isSiege && this.state === 'PLAYING') {
                                this.triggerSunrise();
                            } else if (this.gameMode === 'ENDLESS') {
                                for(let i=0; i<5; i++) {
                                    this.loot.push({ x: z.x + (Math.random()*60-30), y: z.y + (Math.random()*60-30), type: 'food' });
                                    this.loot.push({ x: z.x + (Math.random()*60-30), y: z.y + (Math.random()*60-30), type: 'bandage' });
                                }
                                this.spawnText(z.x+40, z.y, "BOSS DEFEATED!", "#ffcc00");
                            }
                        } else {
                            this.launchCorpse(z, direction); 
                            this.addDecal(z.x + z.w/2, z.y + z.h, z.type === 'spitter' ? 'rgba(150, 200, 0, 0.4)' : 'rgba(120, 0, 0, 0.5)', z.type === 'brute' ? 1.5 : 1.0);
                            
                            if (this.gameMode === 'ENDLESS' && endlessConfig.explodeZ) {
                                this.damagePools.push({ x: z.x, y: z.y, life: 240 });
                                this.spawnParticles(z.x+20, z.y+20, '#cddc39', 20); sfx.sfxExplode();
                            }
                        }

                        if (z.burning && damage === 30) {
                            this.spawnParticles(z.x+20, z.y+20, '#ff9900', 40); this.spawnText(z.x+20, z.y-10, "COMBUSTION!", "#ff9900"); this.shake = Math.max(this.shake, 15); sfx.sfxExplode();
                            this.addDecal(z.x + z.w/2, z.y + z.h, 'rgba(20, 20, 20, 0.6)', 2.0); 
                            this.enemies.forEach(ez => { if (ez !== z && Math.hypot(ez.x - z.x, ez.y - z.y) < 120) { ez.hp -= 50; ez.burning = true; this.spawnText(ez.x+20, ez.y, "-50", "#ff9900"); } });
                        }
                        
                        let dropChance = this.gameMode === 'ENDLESS' ? endlessConfig.bandageDrop : 0.10;
                        if (this.player.hp < this.player.maxHp * 0.3 && this.gameMode !== 'ENDLESS') dropChance = 0.25; 
                        if (Math.random() < dropChance) this.loot.push({ x: z.x, y: z.y, type: 'bandage' });
                    }
                }
            });
        }

        triggerSunrise() {
            this.state = 'SUNRISE';
            this.sunriseTimer = 300; 
            this.announceTimer = 300;
            this.announceText = "SUNRISE";
            this.subAnnounceText = "The Warlord burns!";
            this.enemies.forEach(z => z.burning = true);
            localStorage.setItem('lastDojoEndlessUnlocked', 'true');
            localStorage.setItem('lastDojoEpilogueUnlocked', 'true');
        }

        triggerVictory() {
            this.state = 'VICTORY';
            this.canRestart = false;
            sfx.sfxVictory();
            hideAllMenus();
            document.getElementById('victoryMenu').classList.remove('hidden');
            if (isTouchDevice) document.getElementById('touchUI').classList.add('hidden');
            setTimeout(() => { this.canRestart = true; }, 1500);
        }

        startEpilogue() {
            sfx.sfxVictory(); this.state = 'EPILOGUE'; this.epiPhase = 0; this.epiTimer = 150;
        }

        startRun(mode) {
            requestMobileOptimization();
            localStorage.setItem('lastDojoPlayed', 'true'); renderMenuButtons();
            hideAllMenus();
            if (isTouchDevice) document.getElementById('touchUI').classList.remove('hidden');
            
            this.gameMode = mode; sfx.init(); this.canRestart = false; 
            this.timeTimer = 1000; this.isDay = true; this.dayCount = 1; this.food = 0; this.sleepFade = 0;
            this.isSiege = false; this.shake = 0; this.paused = false; this.announceTimer = 0; this.hitStop = 0;
            this.subAnnounceText = ""; this.spinCooldown = 0; this.damageFlash = 0;
            this.dojo.hp = this.gameMode === 'ENDLESS' ? endlessConfig.dojoHp : 300; 
            this.dojo.maxHp = this.dojo.hp; this.dummy.hits = 0; this.dummy.level = 1; this.dummy.hitsNeeded = 15;
            this.frames = 0; this.decals = []; this.damagePools = []; this.generateScenery(); this.resetEntities();
            
            this.phaseDur = this.gameMode === 'ENDLESS' ? 1000 * endlessConfig.phaseLen : 1000;
            this.timeTimer = this.phaseDur;

            this.state = 'PLAYING';
            let cratesToSpawn = this.gameMode === 'ENDLESS' ? endlessConfig.crates : 3;
            for(let i=0; i<cratesToSpawn; i++) this.spawnBox(); 
        }

        startTutorial() {
            requestMobileOptimization();
            localStorage.setItem('lastDojoPlayed', 'true'); renderMenuButtons();
            hideAllMenus();
            if (isTouchDevice) document.getElementById('touchUI').classList.remove('hidden');

            sfx.init(); this.canRestart = false;
            this.gameMode = 'TUTORIAL';
            this.isDay = true; this.food = 0; this.sleepFade = 0; this.isSiege = false; this.shake = 0; this.paused = false; this.hitStop = 0;
            this.subAnnounceText = ""; this.spinCooldown = 0; this.damageFlash = 0;
            this.dojo.hp = 300; this.dojo.maxHp = 300; this.dummy.hits = 0;
            this.frames = 0; this.decals = []; this.damagePools = []; this.generateScenery(); this.resetEntities();
            this.state = 'TUTORIAL'; this.tutPhase = 0; this.tutTimer = 180;
            this.player.hp = 1000; this.player.maxHp = 1000; this.player.stamina = 100; this.player.condition = 100;
            this.dummy.hitsNeeded = 5; 
        }

        updateTutorialLogic() {
            if (this.tutTimer > 0) this.tutTimer--;
            let kU = getDisplayKey(userKeys.up); let kL = getDisplayKey(userKeys.left); let kD = getDisplayKey(userKeys.down); let kR = getDisplayKey(userKeys.right);
            let kP = getDisplayKey(userKeys.punch); let kS = getDisplayKey(userKeys.spin); let kE = getDisplayKey(userKeys.sleep); let kEat = getDisplayKey(userKeys.eat);

            switch(this.tutPhase) {
                case 0: this.tutText = "For centuries, our bloodline guarded the seal beneath this Dojo."; if (this.tutTimer <= 0) { this.tutPhase = 1; this.tutTimer = 180; } break;
                case 1: this.tutText = "But time weakened the earth. The plague seeped out, raising the dead..."; if (this.tutTimer <= 0) { this.tutPhase = 2; this.tutTimer = 180; } break;
                case 2: 
                    if (this.tutTimer === 179) { sfx.sfxWarlordRoar(); this.shake = 30; }
                    this.tutText = "*KRRR-GAAAHH!* A massive tremor shakes the Dojo..."; 
                    if (this.tutTimer <= 0) { this.tutPhase = 3; this.tutTimer = 240; } 
                    break;
                case 3: this.tutText = "The Warlord. An avatar of the plague building its body deep below."; if (this.tutTimer <= 0) { this.tutPhase = 4; this.tutTimer = 180; } break;
                case 4: this.tutText = "It requires immense lunar energy to manifest. For now, we prepare."; if (this.tutTimer <= 0) { this.tutPhase = 5; this.tutTimer = 180; } break;
                case 5: this.tutText = "You are the last Master. You alone keep the Dojo standing."; if (this.tutTimer <= 0) { this.tutPhase = 6; this.tutTimer = 180; } break;
                case 6: this.tutText = "The dead burn in the sunlight. But the nights are long."; if (this.tutTimer <= 0) { this.tutPhase = 7; this.tutTimer = 30; } break;
                case 7: this.tutText = isTouchDevice ? "Use the Virtual Joystick to move." : `Use ${kU}, ${kL}, ${kD}, ${kR} to move.`; if (this.tutTimer <= 0 && this.player.isMoving) { this.tutPhase = 8; this.tutTimer = 30; sfx.sfxLore(); } break;
                case 8: this.tutText = isTouchDevice ? "Punch the training dummy to increase Max Stamina! (Tap PUNCH)" : `Punch the training dummy to increase Max Stamina! (${kP} to Punch)`; break;
                case 9: this.tutText = isTouchDevice ? "When surrounded, the Hurricane creates space. (Tap SPIN)" : `When surrounded, the Hurricane creates space. (${kS} to Spin)`; break;
                case 10: this.tutText = "Attacks drain Stamina (Blue). Without it, you are defenseless. Exhaust it."; if (this.player.stamina <= 30) { this.tutPhase = 11; this.tutTimer = 120; sfx.sfxLore(); this.player.condition = 10; } break;
                case 11: this.tutText = "Notice how slow Stamina recovers? It depends on your Condition (Yellow)."; if (this.tutTimer <= 0) { if (this.boxes.length === 0) this.spawnBox(); this.tutPhase = 12; this.tutTimer = 60; sfx.sfxLore(); } break;
                case 12: this.tutText = "You are starving. Break the crate to scavenge meat."; if (this.food > 0) { this.tutPhase = 13; this.tutTimer = 60; sfx.sfxLore(); } break;
                case 13: 
                    this.tutText = isTouchDevice ? "Eat the meat to restore your Condition. (Tap EAT)" : `Eat the meat to restore your Condition. (Press ${kEat} to Eat)`; 
                    if (this.keys.eat && this.rReady) {
