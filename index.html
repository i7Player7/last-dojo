                        if (distToTarget < 40 && z.biteTimer <= 0) {
                            z.biteTimer = 60;
                            z.aggroTarget.hp -= 10;
                            this.spawnParticles(z.aggroTarget.x + 20, z.aggroTarget.y + 20, '#cddc39', 8);
                            this.spawnText(z.aggroTarget.x + 20, z.aggroTarget.y, "-10", "#fff");
                            sfx.sfxHit();
                            if (z.aggroTarget.hp <= 0 && !z.aggroTarget.handledDeath) {
                                z.aggroTarget.handledDeath = true;
                                this.launchCorpse(z.aggroTarget, z.facingRight ? 1 : -1); 
                                this.addDecal(z.aggroTarget.x + z.aggroTarget.w/2, z.aggroTarget.y + z.aggroTarget.h, 'rgba(150, 200, 0, 0.4)', 1.0);
                                z.aggroTarget = null;
                            }
                        }
                    }

                    if (z.type === 'spitter') {
                        if (z.shootTimer > 0) z.shootTimer--;
                        if (distToTarget > 300 || !isOnScreen) { 
                            if (z.x < targetX) z.x += z.speed; if (z.x > targetX) z.x -= z.speed; if (z.y < targetY) z.y += z.speed; if (z.y > targetY) z.y -= z.speed;
                        } else {
                            if (z.shootTimer <= 0) {
                                let aimY = isBloodMoonDrone ? targetY + 20 : targetY;
                                let angle = Math.atan2(aimY - (z.y + 20), targetX - (z.x + 20));
                                this.projectiles.push({ x: z.x + 20, y: z.y + 20, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4, life: 250, owner: z, reflected: false });
                                z.shootTimer = 120; sfx.sfxSpit();
                            }
                        }
                        z.facingRight = targetX > z.x;
                    } 
                    else if (z.type === 'straggler' && !z.aggroTarget && !isBloodMoonDrone) {
                        let distToBox = Math.hypot(z.anchorX - z.x, z.anchorY - z.y);
                        if (z.isChasing === undefined) z.isChasing = false;
                        
                        if (z.isChasing && (distToTarget > 200 || distToBox > 300)) z.isChasing = false;
                        if (!z.isChasing && (distToTarget < 140 && distToBox < 250)) z.isChasing = true;

                        if (!z.isChasing) {
                            z.x += (z.speed * 0.5) * z.patrolDir;
                            if (z.x > z.anchorX + 40) z.patrolDir = -1; if (z.x < z.anchorX - 40) z.patrolDir = 1;
                            if (z.y < z.anchorY) z.y += 0.5; if (z.y > z.anchorY) z.y -= 0.5; z.facingRight = z.patrolDir > 0;
                        } else {
                            if (z.x < targetX) z.x += z.speed; if (z.x > targetX) z.x -= z.speed; if (z.y < targetY) z.y += z.speed; if (z.y > targetY) z.y -= z.speed; z.facingRight = targetX > z.x;
                        }
                    } else {
                        if (z.x < targetX) z.x += z.speed; if (z.x > targetX) z.x -= z.speed; if (z.y < targetY) z.y += z.speed; if (z.y > targetY) z.y -= z.speed; z.facingRight = targetX > z.x;
                    }

                    z.isMoving = (z.x !== oldX || z.y !== oldY);

                    let zBox = { x: z.x + 10, y: z.y + 10, w: z.w - 20, h: z.h - 20 }; let pHurtbox = { x: this.player.x + 10, y: this.player.y + 5, w: 20, h: 30 };
                    
                    if (!z.burning && !isBloodMoonDrone && z.biteTimer <= 0 && this.player.iFrames <= 0 && this.rectIntersect(zBox.x, zBox.y, zBox.w, zBox.h, pHurtbox.x, pHurtbox.y, pHurtbox.w, pHurtbox.h)) {
                        let dmg = z.type === 'brute' ? 20 : (z.type === 'warlord' ? 40 : 10); 
                        if (this.gameMode === 'ENDLESS' && z.type !== 'warlord') dmg = Math.floor(dmg * endlessConfig.zDamage);
                        if (this.gameMode === 'ENDLESS' && endlessConfig.ohk) dmg = 9999;

                        this.player.hp = Math.max(0, this.player.hp - dmg); 
                        z.biteTimer = 60; this.player.iFrames = 45; 
                        this.spawnParticles(this.player.x+20, this.player.y+20, '#d32f2f', 10); this.spawnText(this.player.x+20, this.player.y, `-${dmg}`, "#d32f2f"); this.shake = z.type === 'brute' ? 12 : (z.type === 'warlord' ? 20 : 6); sfx.sfxHit();
                        
                        if (z.type !== 'brute' && z.type !== 'warlord') {
                            this.player.x = Math.max(0, Math.min(canvas.width - this.player.size, this.player.x + ((this.player.x < z.x) ? -15 : 15)));
                        }
                    }

                    if (!z.burning && isBloodMoonDrone && z.biteTimer <= 0 && this.rectIntersect(zBox.x, zBox.y, zBox.w, zBox.h, this.dojo.x - 20, this.dojo.y - 20, this.dojo.w + 40, this.dojo.h + 40) && ['PLAYING', 'TUTORIAL'].includes(this.state)) {
                        let dDmg = 5;
                        if (this.gameMode === 'ENDLESS') {
                            if (endlessConfig.ohk) dDmg = 9999;
                            else dDmg = Math.floor(5 * endlessConfig.zDamage);
                        }
                        this.dojo.hp = Math.max(0, this.dojo.hp - dDmg); 
                        z.biteTimer = 60; this.spawnParticles(this.dojo.x+30, this.dojo.y+20, '#1b5e20', 5); this.spawnText(this.dojo.x+30, this.dojo.y, `-${dDmg}`, "#ffcc00"); this.shake = 3; sfx.sfxHit();
                    }
                }
            });

            this.enemies = this.enemies.filter(z => z.hp > 0 || (z.type === 'warlord' && this.state === 'SUNRISE'));

            if (this.player.hp < oldHp) this.damageFlash = 30;

            this.corpses.forEach(c => { c.x += c.vx; c.y += c.vy; c.vy += 0.5; c.rot += c.spin; if (c.y > canvas.height - 40) { c.y = canvas.height - 40; c.vy *= -0.4; c.vx *= 0.5; c.spin *= 0.5; } c.life--; });
            if (this.shake > 0) this.shake *= 0.9; if (this.shake < 0.5) this.shake = 0;
            this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.5; if(p.y > canvas.height) p.vy *= -0.5; p.life--; });
            this.floatTexts.forEach(t => { t.y -= 1; t.life--; });

            this.projectiles = this.projectiles.filter(p => p.life > 0); this.boxes = this.boxes.filter(b => b.hp > 0); 
            this.corpses = this.corpses.filter(c => c.life > 0);
            this.particles = this.particles.filter(p => p.life > 0); this.floatTexts = this.floatTexts.filter(t => t.life > 0);

            if ((this.player.hp <= 0 || this.dojo.hp <= 0) && ['PLAYING', 'SUNRISE', 'TUTORIAL'].includes(this.state)) {
                let wasTutorial = (this.state === 'TUTORIAL');
                this.saveScore(); 
                this.state = 'GAMEOVER'; 
                this.canRestart = false;
                
                document.getElementById('goTitle').innerText = this.dojo.hp <= 0 ? "THE DOJO FELL" : "YOU DIED";
                document.getElementById('goDesc').innerText = wasTutorial ? "Tutorial Failed" : `Survived to Day ${this.dayCount}`;
                hideAllMenus();
                document.getElementById('gameOverMenu').classList.remove('hidden');
                if (isTouchDevice) document.getElementById('touchUI').classList.add('hidden');

                setTimeout(() => { this.canRestart = true; }, 1000);
            }
        }

        drawShadow(x, y, w, h = w) { ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.ellipse(x + w/2, y + h - 5, w/2, 6, 0, 0, Math.PI*2); ctx.fill(); }

        drawLighting() {
            let r=0, g=0, b=0, a=0;
            if (this.state === 'TUTORIAL') {
                if (this.isDay) { r=255; g=120; b=0; a=0.2; } else if (this.isSiege) { r=180; g=0; b=0; a=0.5; } else { r=0; g=0; b=40; a=0.6; }
            } else if (this.state === 'SUNRISE') {
                let pct = 1 - (this.sunriseTimer / 300);
                r = 180 + (75 * pct); g = 180 * pct; b = 0; a = 0.5 - (0.3 * pct);
            } else {
                let pct = this.timeTimer / this.phaseDur; 
                if (this.isDay) {
                    if (pct > 0.75) { let f = (pct - 0.75) / 0.25; r=255; g=120; b=0; a = f * 0.4; } 
                    else if (pct < 0.25) { let f = (0.25 - pct) / 0.25; r=255; g=60; b=0; a = f * 0.5; } 
                } else {
                    if (this.isSiege) { r=180; g=0; b=0; a=0.5; } 
                    else {
                        if (pct > 0.75) { let f = (pct - 0.75) / 0.25; r = 255 * f; g = 60 * f; b = 40 + (f * -40); a = 0.6 - (f * 0.1); } 
                        else if (pct < 0.25) { let f = (0.25 - pct) / 0.25; r = 255 * f; g = 120 * f; b = 40 + (f * -40); a = 0.6 - (f * 0.2); } 
                        else { r=0; g=0; b=40; a=0.6; }
                    }
                }
            }
            let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 200, canvas.width/2, canvas.height/2, canvas.width);
            grad.addColorStop(0, `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, ${a * 0.2})`);
            grad.addColorStop(1, `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, ${a})`);
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (this.gameMode === 'ENDLESS' && endlessConfig.pitchBlack) {
                ctx.fillStyle = 'rgba(0,0,0,0.96)';
                ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'destination-out';
                let pbGrad = ctx.createRadialGradient(this.player.x+20, this.player.y+20, 10, this.player.x+20, this.player.y+20, 130);
                pbGrad.addColorStop(0, 'rgba(255,255,255,1)');
                pbGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = pbGrad;
                ctx.beginPath(); ctx.arc(this.player.x+20, this.player.y+20, 130, 0, Math.PI*2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save();
            if (this.shake > 0 && !this.paused) { let dx = (Math.random() - 0.5) * this.shake; let dy = (Math.random() - 0.5) * this.shake; ctx.translate(dx, dy); }

            ctx.fillStyle = "rgba(0, 0, 0, 0.15)"; ctx.beginPath(); ctx.ellipse(this.dojo.x + 30, this.dojo.y + 25, 80, 40, 0, 0, Math.PI*2); ctx.fill(); 

            if (this.isSiege && this.dojo.hp > 0 && ['PLAYING', 'TUTORIAL'].includes(this.state)) {
                ctx.save();
                ctx.globalAlpha = 0.15 + Math.sin(this.frames * 0.1) * 0.05;
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath(); ctx.ellipse(this.dojo.x + 30, this.dojo.y + 20, 150, 75, 0, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            this.decals.forEach(d => { ctx.globalAlpha = d.life / 300; ctx.fillStyle = d.col; ctx.beginPath(); ctx.ellipse(d.x, d.y, d.s, d.s * 0.5, 0, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha = 1.0; 

            this.damagePools.forEach(dp => {
                ctx.globalAlpha = Math.min(1, dp.life / 240); ctx.fillStyle = "#cddc39"; 
                let rx = 25; let ry = 12;
                if (dp.life > 100000) { 
                    ctx.fillStyle = "#ff5500"; ctx.globalAlpha = 0.7 + Math.sin(this.frames*0.1)*0.2; 
                    rx = 40; ry = 20; 
                } 
                ctx.beginPath(); ctx.ellipse(dp.x, dp.y, rx, ry, 0, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1.0; 

            this.scenery.forEach(s => {
                if(s.type === 'grass') { ctx.fillStyle = s.variant === 1 ? '#4caf50' : '#8bc34a'; ctx.globalAlpha = 0.3; ctx.fillRect(s.x, s.y, 4, 4); ctx.fillRect(s.x + 4, s.y - 4, 4, 4); ctx.globalAlpha = 1.0; } 
                else if (s.type === 'rock') { ctx.fillStyle = s.variant === 1 ? '#555' : '#777'; ctx.beginPath(); ctx.ellipse(s.x, s.y, s.r * 1.5, s.r, 0, 0, Math.PI*2); ctx.fill(); }
            });

            ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(this.dojo.x + 8, this.dojo.y + this.dojo.h - 5, 44, 10);
            this.drawShadow(this.dummy.x, this.dummy.y, 40); this.boxes.forEach(b => this.drawShadow(b.x, b.y, 40)); this.enemies.forEach(z => { if(!z.burning) this.drawShadow(z.x, z.y, z.w, z.h); }); this.drawShadow(this.player.x, this.player.y, 40);

            ctx.drawImage(sprDojo, this.dojo.x, this.dojo.y);
            
            if (this.dojo.hp < this.dojo.maxHp * 0.5) {
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(this.dojo.x+20, this.dojo.y+15); ctx.lineTo(this.dojo.x+25, this.dojo.y+25); ctx.lineTo(this.dojo.x+15, this.dojo.y+35); ctx.stroke();
                if (this.dojo.hp < this.dojo.maxHp * 0.25) { ctx.beginPath(); ctx.moveTo(this.dojo.x+40, this.dojo.y+10); ctx.lineTo(this.dojo.x+35, this.dojo.y+20); ctx.lineTo(this.dojo.x+45, this.dojo.y+30); ctx.stroke(); if(Math.random()<0.1) this.spawnParticles(this.dojo.x+30, this.dojo.y+20, '#ff5500', 1); }
            }

            if (this.isSiege && this.dojo.hp > 0 && this.state !== 'TUTORIAL') {
                ctx.fillStyle = "#222"; ctx.fillRect(this.dojo.x, this.dojo.y - 15, 60, 6); ctx.fillStyle = "#ffcc00"; ctx.fillRect(this.dojo.x, this.dojo.y - 15, (this.dojo.hp/this.dojo.maxHp)*60, 6); ctx.strokeStyle = "#000"; ctx.strokeRect(this.dojo.x, this.dojo.y - 15, 60, 6);
            }

            ctx.drawImage(sprDummy, this.dummy.x, this.dummy.y);
            
            this.loot.forEach(item => { ctx.drawImage(item.type === 'food' ? sprMeat : sprBandage, item.x + 5, item.y + 5); });
            this.boxes.forEach(b => ctx.drawImage(sprBox, b.x, b.y));
            this.projectiles.forEach(p => { ctx.fillStyle = p.reflected ? '#00ffff' : '#cddc39'; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 10; ctx.shadowColor = p.reflected ? '#00ffff' : '#cddc39'; ctx.fill(); ctx.shadowBlur = 0; });
            this.corpses.forEach(c => { ctx.globalAlpha = c.life / 100; drawCharacter(ctx, c, this.frames, this.gameMode); ctx.globalAlpha = 1.0; });
            this.enemies.forEach(z => { 
                if (z.burning && z.type !== 'warlord') ctx.globalAlpha = Math.max(0, z.hp / z.maxHp); 
                drawCharacter(ctx, z, this.frames, this.gameMode); 
                if (z.hitTimer > 0) { ctx.globalCompositeOperation = 'source-atop'; ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillRect(z.x, z.y, z.w, z.h); ctx.globalCompositeOperation = 'source-over'; } 
                
                if (z.aggroTimer > 0 && z.hp > 0 && !z.burning) {
                    ctx.fillStyle = '#ff0000'; ctx.font = "bold 12px Courier"; ctx.fillText("!", z.x + z.w/2, z.y - 5);
                }

                if (z.type === 'warlord' && z.hp > 0 && z.spawnTimer <= 0 && this.state !== 'SUNRISE') {
                    ctx.fillStyle = "#222"; ctx.fillRect(z.x, z.y - 10, z.w, 6); ctx.fillStyle = "#d32f2f"; ctx.fillRect(z.x, z.y - 10, (z.hp/z.maxHp)*z.w, 6); ctx.strokeStyle = "#000"; ctx.strokeRect(z.x, z.y - 10, z.w, 6);
                }
                ctx.globalAlpha = 1.0; 
            });

            if (['PLAYING', 'TUTORIAL', 'SUNRISE'].includes(this.state)) {
                if (this.player.mutationGlow > 0) {
                    ctx.save();
                    ctx.shadowBlur = 20 + Math.sin(this.frames * 0.2) * 10; ctx.shadowColor = '#d32f2f';
                    ctx.globalAlpha = (this.player.mutationGlow / 180) * (0.5 + Math.sin(this.frames * 0.2) * 0.3);
                    ctx.fillStyle = '#d32f2f'; ctx.beginPath(); ctx.arc(this.player.x + 20, this.player.y + 20, 30, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }

                ctx.save(); 
                if (this.player.iFrames > 0 && Math.floor(this.frames / 4) % 2 === 0) ctx.globalAlpha = 0.3; 
                drawCharacter(ctx, this.player, this.frames, this.gameMode); 
                ctx.restore();
            }

            this.particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
            this.floatTexts.forEach(t => { ctx.globalAlpha = t.life / 60; ctx.fillStyle = t.color; ctx.font = "bold 16px Courier"; ctx.textAlign = "center"; ctx.fillText(t.text, t.x, t.y); ctx.globalAlpha = 1.0; });

            if (['PLAYING', 'TUTORIAL', 'SUNRISE'].includes(this.state)) {
                let drawFloatingBar = (yOff, val, max, color) => { 
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(this.player.x, this.player.y - yOff, 40, 6); 
                    ctx.fillStyle = color; ctx.fillRect(this.player.x, this.player.y - yOff, Math.max(0, (val/max)*40), 6); 
                    ctx.strokeStyle = "#000"; ctx.strokeRect(this.player.x, this.player.y - yOff, 40, 6); 
                }
                drawFloatingBar(10, this.player.condition, this.player.maxCondition, "#ff9900"); drawFloatingBar(18, this.player.stamina, this.player.maxStamina, "#3399ff"); drawFloatingBar(26, this.player.hp, this.player.maxHp, "#ef5350");
            }

            ctx.restore(); 
            this.drawLighting();

            if (this.damageFlash > 0) {
                let flashGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height/3, canvas.width/2, canvas.height/2, canvas.width/1.2);
                flashGrad.addColorStop(0, 'rgba(255, 0, 0, 0)');
                flashGrad.addColorStop(1, `rgba(255, 0, 0, ${this.damageFlash / 30})`);
                ctx.fillStyle = flashGrad; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (this.paused && ['PLAYING', 'TUTORIAL', 'SUNRISE'].includes(this.state)) { 
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
            }

            if (this.state === 'TUTORIAL') {
                if (this.tutPhase <= 4) {
                    ctx.fillStyle = "rgba(0,0,0,1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#ffb300"; ctx.font = "bold 20px Courier"; ctx.textAlign = "center";
                    if (this.tutPhase !== 2) ctx.fillText(this.tutText, canvas.width/2, canvas.height/2);
                    else if (this.tutPhase === 2 && this.tutTimer < 179) ctx.fillText(this.tutText, canvas.width/2, canvas.height/2);
                } else {
                    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
                    ctx.fillStyle = "#ffcc00"; ctx.font = "bold 22px Courier"; ctx.textAlign = "center";
                    ctx.fillText(this.tutText, canvas.width/2, canvas.height - 35);
                }
            }
            
            if (this.state === 'EPILOGUE') {
                ctx.fillStyle = "rgba(0,0,0,0.95)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffb300"; ctx.font = "bold 24px Courier"; ctx.textAlign = "center";
                ctx.fillText(this.epiLines[this.epiPhase], canvas.width/2, canvas.height/2);
            }

            if (this.announceTimer > 0 && this.state !== 'TUTORIAL') { 
                let alpha = this.announceTimer > 60 ? 1 : this.announceTimer / 60; 
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`; 
                ctx.font = "bold 60px Courier"; ctx.textAlign = "center"; 
                ctx.fillText(this.announceText, canvas.width/2, canvas.height/4); 
                
                if (this.subAnnounceText) {
                    ctx.fillStyle = `rgba(211, 47, 47, ${alpha})`; 
                    ctx.font = "bold 24px Courier"; 
                    ctx.fillText(this.subAnnounceText, canvas.width/2, canvas.height/4 + 50); 
                }
            }
            if (this.sleepFade > 0) { let alpha = this.sleepFade > 30 ? (60 - this.sleepFade)/30 : this.sleepFade/30; ctx.fillStyle = `rgba(0,0,0,${alpha})`; ctx.fillRect(0,0,canvas.width,canvas.height); }

            if (['PLAYING', 'SUNRISE'].includes(this.state) || (this.state === 'TUTORIAL' && this.tutPhase > 4)) {
                ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, 60); 
                ctx.drawImage(sprMeat, 20, 15);
                ctx.fillStyle = "#fff"; ctx.font = "bold 20px Courier"; ctx.textAlign = "left"; 
                ctx.fillText(`MEAT: ${this.food}`, 55, 35); 
                
                if (this.state !== 'TUTORIAL') {
                    ctx.textAlign = "right";
                    ctx.fillText(`TRAIN: ${this.dummy.hits}/${this.dummy.hitsNeeded}`, canvas.width - 20, 35);
                }
                
                let trackW = 400; let trackX = canvas.width/2 - trackW/2; let trackY = 40;
                ctx.fillStyle = "#333"; ctx.fillRect(trackX, trackY - 2, trackW, 4);
                let pct = 1 - (this.timeTimer / this.phaseDur);
                if (this.state === 'SUNRISE') pct = 1;
                ctx.fillStyle = this.isDay || this.state === 'SUNRISE' ? "#ffeb3b" : "#90caf9"; ctx.fillRect(trackX, trackY - 2, trackW * pct, 4);
                
                let icon = this.isDay || this.state === 'SUNRISE' ? sprSun : (this.isSiege ? sprBloodMoon : sprMoon); 
                ctx.drawImage(icon, trackX + (trackW * pct) - 12, trackY - 12);
                
                ctx.font = "bold 20px Courier"; ctx.fillStyle = this.isSiege ? "#ef5350" : "#fff"; ctx.textAlign = "center";
                let phaseText = (this.isSiege ? "🩸 SIEGE " : (this.isDay || this.state === 'SUNRISE' ? "DAY " : "NIGHT ")) + this.dayCount;
                if (this.state === 'TUTORIAL') phaseText = "PROLOGUE";
                if (this.gameMode === 'ENDLESS') phaseText += " (ENDLESS)";
                ctx.fillText(phaseText, canvas.width/2, 22);
            }
        }
    }

    const gameEngine = new Game();

    function startGame(mode) { document.getElementById('mainMenu').classList.add('hidden'); gameEngine.startRun(mode); }
    function startTutorialMenu() { document.getElementById('mainMenu').classList.add('hidden'); gameEngine.startTutorial(); }
    function startEpilogueMenu() { document.getElementById('mainMenu').classList.add('hidden'); gameEngine.startEpilogue(); }

    const FPS = 60; const frameDelay = 1000 / FPS; let lastFrameTime = performance.now();
    function gameLoop(currentTime) {
        requestAnimationFrame(gameLoop); const deltaTime = currentTime - lastFrameTime;
        if (deltaTime >= frameDelay) { lastFrameTime = currentTime - (deltaTime % frameDelay); if (!gameEngine.paused) gameEngine.update(); gameEngine.draw(); }
    }
    requestAnimationFrame(gameLoop);
</script>
